<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdultJS Debug Module v1.1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { color: #00d4ff; margin-bottom: 5px; font-size: 22px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 13px; }
  .controls {
    background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
    padding: 15px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
  }
  .controls label { color: #aaa; font-size: 12px; display: block; margin-bottom: 3px; }
  .controls input, .controls select {
    background: #1a1a2e; color: #fff; border: 1px solid #0f3460;
    border-radius: 4px; padding: 6px 10px; font-family: inherit; font-size: 13px;
  }
  .controls input:focus, .controls select:focus { outline: none; border-color: #00d4ff; }
  button {
    background: #0f3460; color: #00d4ff; border: 1px solid #00d4ff;
    border-radius: 4px; padding: 8px 16px; cursor: pointer; font-family: inherit;
    font-size: 13px; transition: all 0.2s; white-space: nowrap;
  }
  button:hover { background: #00d4ff; color: #1a1a2e; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.danger { border-color: #ff4757; color: #ff4757; }
  button.danger:hover { background: #ff4757; color: #fff; }
  button.success { border-color: #2ed573; color: #2ed573; }
  button.success:hover { background: #2ed573; color: #1a1a2e; }
  .log-container {
    background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
    padding: 15px; max-height: 75vh; overflow-y: auto; margin-top: 10px;
  }
  .log-entry {
    padding: 3px 0; border-bottom: 1px solid #161b22; font-size: 12px;
    line-height: 1.6; word-break: break-all;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry.info { color: #58a6ff; }
  .log-entry.success { color: #3fb950; }
  .log-entry.warn { color: #d29922; }
  .log-entry.error { color: #f85149; }
  .log-entry.header { color: #bc8cff; font-weight: bold; font-size: 14px; margin-top: 12px; }
  .log-entry.dim { color: #555; }
  .log-entry.video-url { color: #f0e68c; }
  .timestamp { color: #444; margin-right: 8px; font-size: 11px; }
  .tag {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; margin-right: 6px; font-weight: bold;
  }
  .tag.pass { background: #238636; color: #fff; }
  .tag.fail { background: #da3633; color: #fff; }
  .tag.skip { background: #6e7681; color: #fff; }
  .tag.test { background: #1f6feb; color: #fff; }
  .tag.step { background: #8b5cf6; color: #fff; }
  .summary {
    background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
    padding: 15px; margin-top: 15px; display: none; gap: 30px; flex-wrap: wrap;
  }
  .summary-item { text-align: center; }
  .summary-item .num { font-size: 28px; font-weight: bold; }
  .summary-item .label { font-size: 11px; color: #888; margin-top: 4px; }
  .num.green { color: #3fb950; }
  .num.red { color: #f85149; }
  .num.yellow { color: #d29922; }
  .num.blue { color: #58a6ff; }
  .preview-cards { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
  .preview-card {
    background: #21262d; border-radius: 6px; overflow: hidden; width: 200px;
    border: 1px solid #30363d; font-size: 11px;
  }
  .preview-card img { width: 100%; height: 112px; object-fit: cover; background: #333; }
  .preview-card .card-info { padding: 6px; }
  .preview-card .card-title { color: #ccc; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .preview-card .card-duration { color: #888; }
  .preview-card .card-link { color: #58a6ff; text-decoration: none; font-size: 10px; word-break: break-all; }
  .tabs { display: flex; gap: 5px; margin-bottom: 0; flex-wrap: wrap; }
  .tab {
    padding: 6px 14px; border-radius: 4px 4px 0 0; cursor: pointer;
    background: #16213e; color: #888; border: 1px solid #0f3460; border-bottom: none;
    font-size: 12px; transition: all 0.2s;
  }
  .tab:hover { color: #fff; }
  .tab.active { background: #0d1117; color: #00d4ff; border-color: #00d4ff; }
  .hidden { display: none; }
  .progress-bar { height: 4px; background: #21262d; border-radius: 2px; margin: 10px 0; overflow: hidden; }
  .progress-bar .fill { height: 100%; background: #00d4ff; transition: width 0.3s; border-radius: 2px; }
  .proxy-test { font-size: 11px; margin-top: 4px; }
  .proxy-test.ok { color: #3fb950; }
  .proxy-test.err { color: #f85149; }
  code { background: #21262d; padding: 1px 4px; border-radius: 3px; font-size: 11px; }
  a { color: #58a6ff; }
</style>
</head>
<body>

<h1>🔧 AdultJS Debug Module v1.1</h1>
<p class="subtitle">Диагностика и проверка актуальности источников</p>

<div class="controls">
  <div>
    <label>CORS Proxy:</label>
    <select id="proxySelect" onchange="onProxyChange()">
      <option value="corsproxy">corsproxy.io (рекомендуется)</option>
      <option value="allorigins">allorigins.win</option>
      <option value="corsh">cors.sh</option>
      <option value="custom">Свой прокси...</option>
      <option value="none">Без прокси</option>
    </select>
    <div id="proxyStatus" class="proxy-test"></div>
  </div>
  <div id="customProxyWrap" style="display:none">
    <label>URL прокси:</label>
    <input type="text" id="customProxy" placeholder="https://my-proxy.workers.dev/?url=" style="width:300px;">
  </div>
  <div>
    <label>Таймаут (сек):</label>
    <input type="number" id="timeout" value="20" min="5" max="120" style="width:60px;">
  </div>
  <div>
    <label>Фильтр сайтов:</label>
    <input type="text" id="siteFilter" placeholder="trahkino, spankbang..." style="width:200px;">
  </div>
  <div style="display:flex;gap:5px;">
    <button onclick="testProxy()" id="btnTestProxy">🔌 Тест прокси</button>
    <button onclick="runFilteredTests()" class="success" id="btnRunFiltered">▶ Тест выбранных</button>
    <button onclick="runAllTests()" id="btnRunAll">▶▶ Тест ВСЕХ</button>
    <button onclick="clearLog()" class="danger">✕ Очистить</button>
    <button onclick="exportLog()">📋 Экспорт</button>
  </div>
</div>

<div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>

<div class="summary" id="summary">
  <div class="summary-item"><div class="num blue" id="sumTotal">0</div><div class="label">Всего</div></div>
  <div class="summary-item"><div class="num green" id="sumPass">0</div><div class="label">Успешно</div></div>
  <div class="summary-item"><div class="num red" id="sumFail">0</div><div class="label">Ошибка</div></div>
  <div class="summary-item"><div class="num yellow" id="sumWarn">0</div><div class="label">Частично</div></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="log" onclick="switchTab('log')">📋 Лог</div>
  <div class="tab" data-tab="cards" onclick="switchTab('cards')">🖼 Карточки</div>
  <div class="tab" data-tab="video" onclick="switchTab('video')">🎬 Видео</div>
  <div class="tab" data-tab="report" onclick="switchTab('report')">📊 Отчёт</div>
</div>

<div id="tab-log" class="log-container"></div>
<div id="tab-cards" class="log-container hidden"><div class="preview-cards" id="previewCards"></div></div>
<div id="tab-video" class="log-container hidden"><div id="videoTestArea"></div></div>
<div id="tab-report" class="log-container hidden"></div>

<script>
// ======================================================================
// [DEBUG MODULE] v1.1
// Исправления: множественные прокси, таймауты, диагностика ошибок
// ======================================================================

const LOG_EL = document.getElementById('tab-log');
const CARDS_EL = document.getElementById('previewCards');
const VIDEO_EL = document.getElementById('videoTestArea');
const REPORT_EL = document.getElementById('tab-report');

let logEntries = [];
let testResults = { total: 0, pass: 0, fail: 0, warn: 0, details: [] };

// ======================================================================
// [PROXY] Конфигурация прокси-серверов
// ======================================================================

const PROXIES = {
  corsproxy: {
    name: 'corsproxy.io',
    // corsproxy.io принимает URL после знака ?
    buildUrl: (url) => 'https://corsproxy.io/?' + encodeURIComponent(url),
    testUrl: 'https://corsproxy.io/?' + encodeURIComponent('https://httpbin.org/get')
  },
  allorigins: {
    name: 'allorigins.win',
    buildUrl: (url) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    testUrl: 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://httpbin.org/get')
  },
  corsh: {
    name: 'cors.sh',
    buildUrl: (url) => 'https://proxy.cors.sh/' + url,
    testUrl: 'https://proxy.cors.sh/https://httpbin.org/get',
    headers: { 'x-cors-api-key': 'temp_' + Date.now() }
  },
  custom: {
    name: 'Custom',
    buildUrl: (url) => {
      const base = document.getElementById('customProxy').value.trim();
      if (!base) return url;
      // Если оканчивается на = то добавляем encodeURIComponent
      if (base.endsWith('=')) return base + encodeURIComponent(url);
      // Если оканчивается на / то добавляем URL как есть
      if (base.endsWith('/')) return base + url;
      return base + encodeURIComponent(url);
    },
    testUrl: null
  },
  none: {
    name: 'Direct (no proxy)',
    buildUrl: (url) => url,
    testUrl: null
  }
};

function getSelectedProxy() {
  return PROXIES[document.getElementById('proxySelect').value] || PROXIES.corsproxy;
}

function onProxyChange() {
  const val = document.getElementById('proxySelect').value;
  document.getElementById('customProxyWrap').style.display = val === 'custom' ? '' : 'none';
  document.getElementById('proxyStatus').textContent = '';
}

// ======================================================================
// [PROXY] Тест прокси
// ======================================================================

async function testProxy() {
  const proxy = getSelectedProxy();
  const status = document.getElementById('proxyStatus');
  status.textContent = '⏳ Тестирование...';
  status.className = 'proxy-test';

  // Тест 1: Простой запрос
  log(`🔌 Тестирование прокси: ${proxy.name}`, 'info', 'TEST');

  try {
    const testUrl = proxy.buildUrl('https://httpbin.org/get');
    log(`  URL: ${testUrl.substring(0, 100)}...`, 'dim');

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 10000);

    const resp = await fetch(testUrl, {
      signal: controller.signal,
      headers: proxy.headers || {}
    });
    clearTimeout(timer);

    if (resp.ok) {
      const text = await resp.text();
      const isJson = text.includes('"origin"') || text.includes('"url"');
      log(`  ✓ httpbin.org: HTTP ${resp.status}, ответ ${text.length} байт, JSON: ${isJson}`, 'success');
      status.textContent = '✓ Прокси работает';
      status.className = 'proxy-test ok';
    } else {
      log(`  ✗ httpbin.org: HTTP ${resp.status} ${resp.statusText}`, 'error');
      status.textContent = `✗ HTTP ${resp.status}`;
      status.className = 'proxy-test err';
    }
  } catch (e) {
    log(`  ✗ Ошибка: ${e.message}`, 'error');
    status.textContent = `✗ ${e.message}`;
    status.className = 'proxy-test err';
  }

  // Тест 2: Adult-сайт
  log(`  Тест adult-сайта...`, 'info');
  try {
    const testUrl = proxy.buildUrl('https://trahkino.me/');
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 15000);

    const resp = await fetch(testUrl, {
      signal: controller.signal,
      headers: proxy.headers || {}
    });
    clearTimeout(timer);

    if (resp.ok) {
      const text = await resp.text();
      const hasContent = text.includes('<html') || text.includes('<!DOCTYPE') || text.includes('trahkino');
      log(`  ✓ trahkino.me: HTTP ${resp.status}, ${Math.round(text.length/1024)} KB, HTML: ${hasContent}`, 'success');

      if (!hasContent) {
        log(`  ⚠ Ответ не содержит HTML! Возможно прокси возвращает ошибку или редирект`, 'warn');
        log(`  Первые 200 символов: <code>${text.substring(0, 200).replace(/</g,'&lt;')}</code>`, 'dim');
      }
    } else {
      log(`  ✗ trahkino.me: HTTP ${resp.status} ${resp.statusText}`, 'error');
    }
  } catch (e) {
    log(`  ✗ trahkino.me: ${e.message}`, 'error');
    log(`  💡 Попробуйте другой прокси или увеличьте таймаут`, 'warn');
  }
}

// ======================================================================
// [HTTP] Загрузка с прокси, повторными попытками и фоллбэком
// ======================================================================

async function fetchPage(url, charset) {
  const proxy = getSelectedProxy();
  const timeout = parseInt(document.getElementById('timeout').value) * 1000;

  // Попытка 1: выбранный прокси
  try {
    const result = await doFetch(proxy.buildUrl(url), timeout, proxy.headers, charset);
    return { html: result, proxy: proxy.name, error: null };
  } catch (e1) {
    log(`  ⚠ ${proxy.name} не сработал: ${e1.message}`, 'warn');

    // Попытка 2: фоллбэк на другой прокси
    const fallbackKeys = Object.keys(PROXIES).filter(k =>
      k !== 'none' && k !== 'custom' && k !== document.getElementById('proxySelect').value
    );

    for (const key of fallbackKeys) {
      const fb = PROXIES[key];
      try {
        log(`  🔄 Пробуем фоллбэк: ${fb.name}...`, 'dim');
        const result = await doFetch(fb.buildUrl(url), timeout, fb.headers, charset);
        // Проверяем что это реально HTML
        if (result.length > 500 && (result.includes('<') || result.includes('{'))) {
          log(`  ✓ Фоллбэк ${fb.name} сработал!`, 'success');
          return { html: result, proxy: fb.name, error: null };
        }
      } catch (e2) {
        // продолжаем
      }
    }

    return { html: null, proxy: null, error: e1.message };
  }
}

async function doFetch(fullUrl, timeout, headers, charset) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);

  try {
    const resp = await fetch(fullUrl, {
      signal: controller.signal,
      headers: Object.assign({}, headers || {})
    });
    clearTimeout(timer);

    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    }

    if (charset && !/^utf-?8$/i.test(charset)) {
      const buf = await resp.arrayBuffer();
      return new TextDecoder(charset).decode(buf);
    }
    return await resp.text();
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('Таймаут (' + (timeout/1000) + 'с)');
    throw e;
  }
}

// ======================================================================
// [LOG] Утилиты логирования
// ======================================================================

function log(msg, cls, tag) {
  cls = cls || '';
  tag = tag || '';
  const time = new Date().toLocaleTimeString();
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + cls;
  let tagHtml = '';
  if (tag) {
    const tc = ({PASS:'pass',FAIL:'fail',SKIP:'skip',TEST:'test',STEP:'step'})[tag] || 'step';
    tagHtml = `<span class="tag ${tc}">${tag}</span>`;
  }
  entry.innerHTML = `<span class="timestamp">${time}</span>${tagHtml}${msg}`;
  LOG_EL.appendChild(entry);
  LOG_EL.scrollTop = LOG_EL.scrollHeight;
  logEntries.push({ time, msg, cls, tag });
}

function clearLog() {
  LOG_EL.innerHTML = '';
  CARDS_EL.innerHTML = '';
  VIDEO_EL.innerHTML = '';
  REPORT_EL.innerHTML = '';
  logEntries = [];
  testResults = { total: 0, pass: 0, fail: 0, warn: 0, details: [] };
  document.getElementById('summary').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
}

function updateSummary() {
  const s = document.getElementById('summary');
  s.style.display = 'flex';
  document.getElementById('sumTotal').textContent = testResults.total;
  document.getElementById('sumPass').textContent = testResults.pass;
  document.getElementById('sumFail').textContent = testResults.fail;
  document.getElementById('sumWarn').textContent = testResults.warn;
}

function updateProgress(cur, tot) {
  document.getElementById('progressFill').style.width = Math.round(cur/tot*100) + '%';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  ['log','cards','video','report'].forEach(id => {
    document.getElementById('tab-'+id).classList.toggle('hidden', id !== name);
  });
}

function exportLog() {
  let t = 'AdultJS Debug Report\n' + '='.repeat(60) + '\n';
  t += `Date: ${new Date().toISOString()}\n`;
  t += `Total: ${testResults.total} | Pass: ${testResults.pass} | Fail: ${testResults.fail} | Warn: ${testResults.warn}\n\n`;
  testResults.details.forEach(d => {
    t += `[${d.status}] ${d.site}\n  List: ${d.listing||'—'}\n  Cards: ${d.cards||'—'}\n  Video: ${d.videoUrl||'—'}\n  Stream: ${d.stream||'—'}\n  Error: ${d.error||'none'}\n\n`;
  });
  const blob = new Blob([t], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'adultjs-debug-' + Date.now() + '.txt';
  a.click();
}

// ======================================================================
// [PARSE] XPath парсинг карточек из HTML
// ======================================================================

function parseCardsXPath(html, site) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Поиск карточек по XPath
  const snap = doc.evaluate(site.cardXpath, doc, null, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE, null);
  const total = snap.snapshotLength;
  const cards = [];

  for (let i = 0; i < Math.min(total, 5); i++) {
    const node = snap.snapshotItem(i);
    const card = {};

    // Название
    if (site.titleXpath) {
      const tn = doc.evaluate(site.titleXpath, node, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
      card.title = tn ? tn.textContent.trim() : '';
    }
    if (!card.title) {
      // Фоллбэк: ищем разными способами
      const el = node.querySelector('.title, [class*="title"], p, h2, h3, strong');
      card.title = el ? el.textContent.trim() : '';
    }
    if (!card.title) {
      const a = node.querySelector('a[title]');
      card.title = a ? a.getAttribute('title') : '';
    }

    // Ссылка
    const linkEl = node.querySelector('a[href]');
    card.href = linkEl ? linkEl.getAttribute('href') : '';
    if (card.href && !card.href.startsWith('http')) {
      card.href = site.host.replace(/\/+$/, '') + (card.href.startsWith('/') ? '' : '/') + card.href;
    }

    // Картинка — перебираем атрибуты
    const imgEl = node.querySelector('img');
    if (imgEl) {
      const imgAttrs = site.imgAttrs || ['data-original', 'data-src', 'data-lazy-src', 'data-thumb_url', 'srcset', 'src'];
      for (const attr of imgAttrs) {
        const val = imgEl.getAttribute(attr);
        if (val && val.trim() && !val.startsWith('data:')) {
          card.img = val.trim().split(',')[0].trim().split(' ')[0]; // srcset: берём первый
          break;
        }
      }
      if (card.img && !card.img.startsWith('http')) {
        if (card.img.startsWith('//')) card.img = 'https:' + card.img;
        else if (card.img.startsWith('/')) card.img = site.host + card.img;
      }
    }

    // Длительность
    if (site.durationXpath) {
      const dn = doc.evaluate(site.durationXpath, node, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
      card.duration = dn ? dn.textContent.trim() : '';
    }
    if (!card.duration) {
      const durEl = node.querySelector('.duration, [class*="duration"], .time, [class*="time"], span');
      card.duration = durEl ? durEl.textContent.trim().replace(/\s+/g, ' ') : '';
    }

    cards.push(card);
  }

  return { total, cards };
}

// ======================================================================
// [PARSE] Regex парсинг карточек (встроенные парсеры)
// ======================================================================

function parseCardsRegex(html, site) {
  const rx = new RegExp(site.cardPattern.source, 'g');
  let count = 0;
  let m;
  while ((m = rx.exec(html)) !== null) count++;

  // Попробуем найти первую ссылку на видео
  let firstHref = null;
  const linkRx = /href="(\/?video[^"]*?)"/;
  const linkMatch = html.match(linkRx);
  if (linkMatch) {
    firstHref = linkMatch[1];
    if (!firstHref.startsWith('http')) firstHref = site.host + (firstHref.startsWith('/') ? '' : '/') + firstHref;
  }

  return { total: count, cards: [], firstHref };
}

// ======================================================================
// [PARSE] Извлечение видео-потоков
// ======================================================================

function extractStreams(html, site) {
  const streams = {};
  let found = false;

  // 1. Основной паттерн
  if (site.videoPattern) {
    const m = html.match(site.videoPattern);
    if (m && (m[1] || m[0])) {
      streams.main = m[1] || m[0];
      found = true;
    }
  }

  // 2. nodeFile (Xhamster, PornOne и др.)
  if (site.videoNodeFile) {
    try {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const n = doc.evaluate(site.videoNodeFile, doc, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
      if (n) {
        const val = n.getAttribute('href') || n.getAttribute('content') || n.getAttribute('src');
        if (val) { streams.nodeFile = val; found = true; }
      }
    } catch(e) {}
  }

  // 3. Альтернативные паттерны
  if (site.altVideoPatterns) {
    site.altVideoPatterns.forEach(alt => {
      const m = html.match(alt.regex);
      if (m) {
        streams['alt_' + alt.name] = m[1] || m[0];
        found = true;
      }
    });
  }

  // 4. Общий поиск MP4/M3U8
  const mp4All = html.match(/https?:\/\/[^\s'"<>]+\.mp4[^\s'"<>]*/g) || [];
  const mp4Real = mp4All.filter(u => !u.includes('preview') && !u.includes('screenshot') && !u.includes('thumb'));
  const m3u8s = html.match(/https?:\/\/[^\s'"<>]+\.m3u8[^\s'"<>]*/g) || [];

  streams.mp4_total = mp4All.length;
  streams.mp4_real = mp4Real;
  streams.m3u8 = m3u8s;

  if (!found && (mp4Real.length || m3u8s.length)) found = true;

  return { found, streams };
}

async function testSite(site) {
  const detail = { site:site.name, status:'UNKNOWN', listing:null, cards:null, videoUrl:null, stream:null, error:null };

  log(`<b>═══ ${site.name} ═══</b> <span style="color:#666">${site.type||'nexthub'} | ${site.host}</span>`, 'header', 'TEST');
  if (site.notes) log(`ℹ️ ${site.notes}`, 'dim');

  // ─── STEP 1: Листинг ───
  log('Шаг 1: Загрузка листинга', 'info', 'STEP');
  const listUrl = site.host + (site.listUri ? '/' + site.listUri : '');
  log(`URL: <a href="${listUrl}" target="_blank">${listUrl}</a>`, 'dim');

  const listResult = await fetchPage(listUrl, site.charset);

  if (!listResult.html) {
    log(`✗ Не удалось загрузить: ${listResult.error}`, 'error', 'FAIL');
    detail.listing = 'FAIL: ' + listResult.error;
    detail.error = listResult.error;
    detail.status = 'FAIL';
    testResults.fail++; testResults.total++;
    testResults.details.push(detail);
    updateSummary();
    return;
  }

  const kb = Math.round(listResult.html.length / 1024);
  log(`✓ Загружено: ${kb} KB через ${listResult.proxy}`, 'success');
  detail.listing = kb + ' KB';

  // Проверяем что это HTML
  const looksLikeHtml = listResult.html.includes('<') && (listResult.html.includes('html') || listResult.html.includes('div') || listResult.html.includes('body'));
  if (!looksLikeHtml) {
    log(`⚠ Ответ не похож на HTML! (может JSON или текст ошибки)`, 'warn');
    log(`Начало: <code>${listResult.html.substring(0, 200).replace(/</g,'&lt;')}</code>`, 'dim');
  }

  // ─── STEP 2: Карточки ───
  log('Шаг 2: Парсинг карточек', 'info', 'STEP');

  let cardTotal = 0;
  let parsedCards = [];
  let firstVideoUrl = null;

  if (site.cardXpath) {
    const result = parseCardsXPath(listResult.html, site);
    cardTotal = result.total;
    parsedCards = result.cards;
    log(`XPath <code>${site.cardXpath}</code> → ${cardTotal} элементов`, cardTotal > 0 ? 'success' : 'warn');

    if (parsedCards.length > 0) {
      parsedCards.forEach((c, i) => {
        log(`  [${i+1}] "${(c.title||'').substring(0,50)}" | ${c.duration||'—'} | img:${c.img?'✓':'✗'} | <a href="${c.href}" target="_blank">link</a>`, 'dim');

        // Визуальная карточка
        const el = document.createElement('div');
        el.className = 'preview-card';
        el.innerHTML = `
          <img src="${c.img||''}" onerror="this.style.background='#444'" loading="lazy">
          <div class="card-info">
            <div class="card-title">${c.title||'N/A'}</div>
            <div class="card-duration">${c.duration||'—'} — ${site.name}</div>
            <a class="card-link" href="${c.href||'#'}" target="_blank">${(c.href||'').substring(0,50)}</a>
          </div>`;
        CARDS_EL.appendChild(el);
      });

      firstVideoUrl = parsedCards.find(c => c.href)?.href;
    }

    // Если карточек 0 — диагностика
    if (cardTotal === 0) {
      log(`  🔍 Диагностика: ищем возможные контейнеры...`, 'warn');
      const doc = new DOMParser().parseFromString(listResult.html, 'text/html');
      const xpathTests = [
        "//div[contains(@class,'item')]",
        "//div[contains(@class,'video')]",
        "//div[contains(@class,'thumb')]",
        "//article",
        "//li[contains(@class,'video')]",
        "//a[contains(@class,'video')]",
        "//div[contains(@class,'list')]//div",
      ];
      xpathTests.forEach(xp => {
        try {
          const r = doc.evaluate(xp, doc, null, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE, null);
          if (r.snapshotLength > 0) log(`  → <code>${xp}</code> = ${r.snapshotLength}`, 'warn');
        } catch(e) {}
      });
    }

    detail.cards = cardTotal + ' найдено';

  } else if (site.cardPattern) {
    const result = parseCardsRegex(listResult.html, site);
    cardTotal = result.total;
    firstVideoUrl = result.firstHref;
    log(`Regex → ${cardTotal} совпадений`, cardTotal > 0 ? 'success' : 'warn');
    detail.cards = cardTotal + ' regex matches';
  }

  if (cardTotal > 0) {
    log(`✓ Карточки: ${cardTotal}`, 'success', 'PASS');
  } else {
    log(`✗ Карточки не найдены`, 'error', 'FAIL');
  }

  // ─── STEP 3: Страница видео ───
  if (!firstVideoUrl) {
    log('Шаг 3: Пропущен — нет ссылки на видео', 'warn', 'SKIP');
  } else {
    log('Шаг 3: Загрузка страницы видео', 'info', 'STEP');
    log(`URL: <a href="${firstVideoUrl}" target="_blank">${firstVideoUrl}</a>`, 'dim');
    detail.videoUrl = firstVideoUrl;

    const videoResult = await fetchPage(firstVideoUrl, site.charset);

    if (!videoResult.html) {
      log(`✗ Не удалось загрузить видео-страницу: ${videoResult.error}`, 'error');
    } else {
      const vkb = Math.round(videoResult.html.length / 1024);
      log(`✓ Видео-страница: ${vkb} KB через ${videoResult.proxy}`, 'success');

      // ─── STEP 4: Потоки ───
      log('Шаг 4: Извлечение видео-потоков', 'info', 'STEP');

      const streamResult = extractStreams(videoResult.html, site);

      if (streamResult.streams.main) {
        log(`✓ Основной поток: <code>${streamResult.streams.main.substring(0, 120)}</code>`, 'success', 'PASS');
        detail.stream = streamResult.streams.main;
      }
      if (streamResult.streams.nodeFile) {
        log(`✓ nodeFile: <code>${streamResult.streams.nodeFile.substring(0, 120)}</code>`, 'success');
        if (!detail.stream) detail.stream = streamResult.streams.nodeFile;
      }

      // Альтернативные
      Object.keys(streamResult.streams).forEach(k => {
        if (k.startsWith('alt_') && streamResult.streams[k]) {
          const val = streamResult.streams[k];
          log(`  ✓ ${k.replace('alt_','')}: <code>${(typeof val === 'string' ? val : JSON.stringify(val)).substring(0, 120)}</code>`, 'success');
          if (!detail.stream) detail.stream = typeof val === 'string' ? val : val[0];
        }
      });

      // MP4/M3U8 сводка
      const mp4r = streamResult.streams.mp4_real || [];
      const m3u8 = streamResult.streams.m3u8 || [];
      log(`  📊 MP4 всего: ${streamResult.streams.mp4_total}, реальных: ${mp4r.length}, M3U8: ${m3u8.length}`, mp4r.length || m3u8.length ? 'success' : 'warn');

      if (mp4r.length) {
        mp4r.slice(0, 3).forEach(u => log(`  → <code>${u.substring(0, 120)}</code>`, 'dim'));
        if (!detail.stream) detail.stream = mp4r[0];
      }
      if (m3u8.length) {
        m3u8.slice(0, 2).forEach(u => log(`  → <code>${u.substring(0, 120)}</code>`, 'dim'));
        if (!detail.stream) detail.stream = m3u8[0];
      }

      if (!streamResult.found) {
        log(`✗ Видео-потоки НЕ НАЙДЕНЫ`, 'error', 'FAIL');
        detail.stream = 'NOT FOUND';

        // Дамп фрагментов для отладки
        log(`  📋 Поиск плеерных конструкций в HTML:`, 'warn');
        const patterns = [
          { n: 'flashvars', rx: /flashvars[^=]*=\s*\{/ },
          { n: 'video_url', rx: /video_url[:\s]+['"]/ },
          { n: 'sources:', rx: /sources\s*[:=]\s*\[/ },
          { n: 'file:', rx: /file\s*[:=]\s*['"]/ },
          { n: '<source', rx: /<source[^>]+src=/ },
          { n: '<video', rx: /<video[^>]+src=/ },
          { n: 'player.setup', rx: /player\.setup\(/ },
          { n: 'KVS player', rx: /video_id:\s*'/ },
          { n: 'function/0/', rx: /function\/0\// },
        ];
        patterns.forEach(p => {
          const m = videoResult.html.match(p.rx);
          if (m) {
            const idx = m.index;
            const ctx = videoResult.html.substring(idx, idx + 200).replace(/</g, '&lt;');
            log(`  ✓ <b>${p.n}</b> найден (pos ${idx}): <code>${ctx}</code>`, 'warn');
          }
        });
      }

      // ─── STEP 5: Проверка доступности ───
      if (detail.stream && detail.stream !== 'NOT FOUND') {
        log('Шаг 5: Проверка доступности потока', 'info', 'STEP');
        await testStreamUrl(detail.stream, site.name);
      }
    }
  }

  // ─── ИТОГ ───
  const cardOk = cardTotal > 0;
  const streamOk = detail.stream && detail.stream !== 'NOT FOUND';

  if (cardOk && streamOk) {
    detail.status = 'PASS'; testResults.pass++;
    log(`✅ ${site.name}: ВСЕ ОК`, 'success', 'PASS');
  } else if (cardOk) {
    detail.status = 'WARN'; testResults.warn++;
    log(`⚠️ ${site.name}: Карточки ОК, видео НЕТ`, 'warn', 'FAIL');
  } else if (streamOk) {
    detail.status = 'WARN'; testResults.warn++;
    log(`⚠️ ${site.name}: Карточки НЕТ, видео ОК`, 'warn', 'FAIL');
  } else {
    detail.status = 'FAIL'; testResults.fail++;
    log(`❌ ${site.name}: НЕ РАБОТАЕТ`, 'error', 'FAIL');
  }

  testResults.total++;
  testResults.details.push(detail);
  updateSummary();
  log('', 'dim');
}

// ======================================================================
// [STREAM] Тест доступности видео-URL
// ======================================================================

async function testStreamUrl(url, siteName) {
  // Убираем trailing / из URL (KVS добавляет)
  url = url.replace(/\/$/, '');

  log(`  Проверка: <code>${url.substring(0, 100)}</code>`, 'dim');

  const proxy = getSelectedProxy();

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 12000);

    // Пробуем HEAD
    const resp = await fetch(proxy.buildUrl(url), {
      method: 'HEAD',
      signal: controller.signal,
      headers: proxy.headers || {}
    });
    clearTimeout(timer);

    const ct = resp.headers.get('content-type') || '?';
    const cl = resp.headers.get('content-length');
    const size = cl ? (parseInt(cl)/1048576).toFixed(1) + ' MB' : '? size';

    if (resp.ok) {
      log(`  ✓ Доступен: HTTP ${resp.status} | ${ct} | ${size}`, 'success', 'PASS');

      // Добавить видео-плеер
      if (ct.includes('video') || url.includes('.mp4') || url.includes('.m3u8')) {
        const el = document.createElement('div');
        el.style.marginBottom = '15px';
        el.innerHTML = `
          <p style="color:#aaa;font-size:11px;margin:4px 0">${siteName}: ${url.substring(0,80)}...</p>
          <video controls preload="metadata" crossorigin="anonymous" style="max-width:480px;max-height:270px;border-radius:6px;background:#000;">
            <source src="${proxy.buildUrl(url)}" type="video/mp4">
          </video>
          <br><small style="color:#666">Если не воспроизводится в браузере — проверьте в Lampa на TV</small>`;
        VIDEO_EL.appendChild(el);
      }
    } else {
      log(`  ✗ HTTP ${resp.status} ${resp.statusText}`, 'error');

      // Если HEAD не работает — пробуем GET с range
      try {
        const resp2 = await fetch(proxy.buildUrl(url), {
          headers: Object.assign({ 'Range': 'bytes=0-1024' }, proxy.headers || {})
        });
        if (resp2.ok || resp2.status === 206) {
          log(`  ✓ GET+Range работает: HTTP ${resp2.status}`, 'success');
        }
      } catch(e) {}
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      log(`  ⚠ Таймаут проверки`, 'warn');
    } else {
      log(`  ⚠ Ошибка проверки (CORS): ${e.message}`, 'warn');
      log(`  💡 Видео может работать в Lampa (native запросы обходят CORS)`, 'dim');
    }
  }
}

    return;
  }

  log(`🚀 Тест: ${sites.map(s => s.name).join(', ')}`, 'header');
  log(`Прокси: ${getSelectedProxy().name} | Таймаут: ${document.getElementById('timeout').value}с`, 'dim');
  log('', 'dim');

  for (let i = 0; i < sites.length; i++) {
    updateProgress(i + 1, sites.length);
    await testSite(sites[i]);
    await new Promise(r => setTimeout(r, 800));
  }

  generateReport();
  document.getElementById('btnRunAll').disabled = false;
  document.getElementById('btnRunFiltered').disabled = false;
  log('🏁 ЗАВЕРШЕНО', 'header');
}

// ======================================================================
// [REPORT] Сводный отчёт
// ======================================================================

function generateReport() {
  let h = '<div style="font-size:13px;">';
  h += '<h3 style="color:#00d4ff;margin-bottom:10px;">📊 Сводный отчёт</h3>';
  h += '<table style="width:100%;border-collapse:collapse;">';
  h += '<tr style="background:#21262d;"><th style="padding:6px;text-align:left">Сайт</th><th>Листинг</th><th>Карточки</th><th>Видео</th><th>Поток</th><th>Статус</th></tr>';

  testResults.details.forEach(d => {
    const color = ({PASS:'#3fb950',WARN:'#d29922',FAIL:'#f85149'})[d.status] || '#888';
    const icon = ({PASS:'✅',WARN:'⚠️',FAIL:'❌'})[d.status] || '?';
    h += `<tr style="border-bottom:1px solid #21262d;">
      <td style="padding:4px 6px;font-weight:bold">${d.site}</td>
      <td style="padding:4px;font-size:11px;color:${d.listing?.includes('FAIL')?'#f85149':'#aaa'}">${d.listing||'—'}</td>
      <td style="padding:4px;font-size:11px;color:${d.cards?.includes('0')?'#f85149':'#aaa'}">${d.cards||'—'}</td>
      <td style="padding:4px;font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(d.videoUrl||'—').substring(0,40)}</td>
      <td style="padding:4px;font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${d.stream==='NOT FOUND'?'#f85149':'#aaa'}">${(d.stream||'—').substring(0,40)}</td>
      <td style="padding:4px;color:${color};font-weight:bold">${icon} ${d.status}</td>
    </tr>`;
  });

  h += '</table></div>';
  REPORT_EL.innerHTML = h;
}
