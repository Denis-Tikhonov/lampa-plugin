function log(msg, cls = '', tag = '') {
  const time = new Date().toLocaleTimeString();
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + cls;
  let tagHtml = '';
  if (tag) {
    const tagCls = tag === 'PASS' ? 'pass' : tag === 'FAIL' ? 'fail' : tag === 'SKIP' ? 'skip' : tag === 'TEST' ? 'test' : 'step';

  entry.innerHTML = `<span class="timestamp">${time}</span>${tagHtml}${msg}`;
  LOG.appendChild(entry);
  LOG.scrollTop = LOG.scrollHeight;
  logEntries.push({ time, msg, cls, tag });
}

function clearLog() {
  LOG.innerHTML = '';

function updateProgress(current, total) {

async function fetchWithProxy(url, charset = null) {
  const proxy = document.getElementById('proxySelect').value;
  const timeout = parseInt(document.getElementById('timeout').value) * 1000;
  const fullUrl = proxy ? proxy + encodeURIComponent(url) : url;
  
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  
  try {
    const resp = await fetch(fullUrl, { 
      signal: controller.signal,
      headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
    });
    clearTimeout(timer);
    
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    
    if (charset && charset !== 'utf-8' && charset !== 'UTF-8') {
      const buf = await resp.arrayBuffer();
      return new TextDecoder(charset).decode(buf);
    }
    return await resp.text();
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

async function testSite(site) {
  const detail = { site: site.name, status: 'UNKNOWN', listing: null, cards: null, videoUrl: null, stream: null, error: null };
  
  log(`<b>═══ ${site.name} ═══</b> <span style="color:#666">(${site.type})</span>`, 'header', 'TEST');
  if (site.notes) log(`ℹ️ ${site.notes}`, 'dim');

  // ─── Шаг 1: Загрузка листинга ───
  log(`Шаг 1: Загрузка листинга...`, 'info', 'STEP');
  let listUrl = site.listUrl || (site.host + (site.listUri ? '/' + site.listUri : ''));
  log(`URL: <a href="${listUrl}" target="_blank" style="color:#58a6ff">${listUrl}</a>`, 'dim');

  let listHtml;
  try {
    listHtml = await fetchWithProxy(listUrl, site.charset);
    const sizeKb = Math.round(listHtml.length / 1024);
    log(`✓ Загружено: ${sizeKb} KB`, 'success');
    detail.listing = `${sizeKb} KB`;
  } catch (e) {
    log(`✗ Ошибка загрузки: ${e.message}`, 'error', 'FAIL');
    detail.listing = 'FAIL: ' + e.message;
    detail.status = 'FAIL';
    detail.error = e.message;
    testResults.fail++;
    testResults.total++;
    testResults.details.push(detail);
    updateSummary();
    return detail;
  }

  // ─── Шаг 2: Парсинг карточек ───
  log(`Шаг 2: Парсинг карточек видео...`, 'info', 'STEP');
  
  let cards = [];
  let firstVideoUrl = null;

  if (site.cardXpath) {
    // XPath парсинг (NextHub стиль)
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(listHtml, 'text/html');
      const result = doc.evaluate(site.cardXpath, doc, null, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE, null);
      
      log(`XPath: <code>${site.cardXpath}</code> → найдено: ${result.snapshotLength}`, 
          result.snapshotLength > 0 ? 'success' : 'error');
      
      for (let i = 0; i < Math.min(result.snapshotLength, 5); i++) {
        const node = result.snapshotItem(i);
        const card = {};
        
        // Название
        if (site.titleXpath) {
          const titleNode = doc.evaluate(site.titleXpath, node, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
          card.title = titleNode ? titleNode.textContent.trim() : '';
        } else {
          const titleEl = node.querySelector('a[title]') || node.querySelector('.title') || node.querySelector('p') || node.querySelector('h2, h3');
          card.title = titleEl ? (titleEl.getAttribute('title') || titleEl.textContent || '').trim() : '';
        }
        
        // Ссылка
        const linkEl = node.querySelector('a[href]');
        card.href = linkEl ? linkEl.getAttribute('href') : '';
        if (card.href && !card.href.startsWith('http')) {
          card.href = site.host + (card.href.startsWith('/') ? '' : '/') + card.href;
        }
        
        // Картинка
        const imgEl = node.querySelector('img');
        if (imgEl) {
          card.img = imgEl.getAttribute(site.imgAttr || 'data-src') || 
                     imgEl.getAttribute('data-original') || 
                     imgEl.getAttribute('src') || '';
          if (card.img && !card.img.startsWith('http')) {
            if (card.img.startsWith('//')) card.img = 'https:' + card.img;
            else card.img = site.host + card.img;
          }
        }
        
        // Длительность
        if (site.durationXpath) {
          const durNode = doc.evaluate(site.durationXpath, node, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
          card.duration = durNode ? durNode.textContent.trim() : '';
        } else {
          const durEl = node.querySelector('.duration, .time, [class*="duration"], [class*="time"]');
          card.duration = durEl ? durEl.textContent.trim() : '';
        }
        
        cards.push(card);
        if (!firstVideoUrl && card.href) firstVideoUrl = card.href;
      }
      
      detail.cards = `${result.snapshotLength} найдено`;
    } catch (e) {
      log(`✗ Ошибка XPath: ${e.message}`, 'error');
      detail.cards = 'FAIL: ' + e.message;
    }
  } else if (site.cardPattern) {
    // Regex парсинг (встроенные парсеры)
    const matches = listHtml.match(new RegExp(site.cardPattern.source, 'g'));
    const count = matches ? matches.length : 0;
    log(`Regex: /${site.cardPattern.source}/ → найдено: ${count}`, count > 0 ? 'success' : 'error');
    detail.cards = count + ' совпадений';
    
    // Попробуем найти ссылку на видео
    const hrefMatch = listHtml.match(/href="(\/video[^"]+)"/);
    if (hrefMatch) firstVideoUrl = site.host + hrefMatch[1];
  }
  
  // Показать карточки
  if (cards.length > 0) {
    log(`✓ Карточки успешно распарсены (${cards.length} превью)`, 'success', 'PASS');
    cards.forEach((card, i) => {
      log(`  [${i+1}] "${card.title?.substring(0, 50)}..." | ${card.duration} | <a href="${card.href}" target="_blank">link</a>`, 'dim');
      
      // Добавить в таб карточек
      const cardEl = document.createElement('div');
      cardEl.className = 'preview-card';
      cardEl.innerHTML = `
        <img src="${card.img || ''}" onerror="this.style.background='#444';this.alt='No image'" loading="lazy">
        <div class="card-info">
          <div class="card-title" title="${card.title || ''}">${card.title || 'N/A'}</div>
          <div class="card-duration">${card.duration || '??:??'} — ${site.name}</div>
          <a class="card-link" href="${card.href || '#'}" target="_blank">${card.href?.substring(0, 40) || 'N/A'}...</a>
        </div>`;
      CARDS.appendChild(cardEl);
    });
  } else {
    log(`✗ Карточки не найдены!`, 'error', 'FAIL');
    
    // Диагностика
    log(`  📋 Диагностика HTML (первые 500 символов):`, 'warn');
    log(`  <code>${listHtml.substring(0, 500).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code>`, 'dim');
    
    // Поиск возможных классов
    const classes = listHtml.match(/class="[^"]+"/g);
    if (classes) {
      const unique = [...new Set(classes.slice(0, 20))];
      log(`  🔍 Найденные классы: ${unique.join(', ')}`, 'warn');
    }
  }

  // ─── Шаг 3: Загрузка страницы видео ───
  if (firstVideoUrl) {
    log(`Шаг 3: Загрузка страницы видео...`, 'info', 'STEP');
    log(`URL: <a href="${firstVideoUrl}" target="_blank" style="color:#58a6ff">${firstVideoUrl}</a>`, 'dim');
    
    let videoHtml;
    try {
      videoHtml = await fetchWithProxy(firstVideoUrl, site.charset);
      const sizeKb = Math.round(videoHtml.length / 1024);
      log(`✓ Страница видео загружена: ${sizeKb} KB`, 'success');
      detail.videoUrl = firstVideoUrl;
    } catch (e) {
      log(`✗ Ошибка загрузки страницы видео: ${e.message}`, 'error');
      detail.videoUrl = 'FAIL: ' + e.message;
    }

    // ─── Шаг 4: Извлечение потоков видео ───
    if (videoHtml) {
      log(`Шаг 4: Извлечение видео-потоков...`, 'info', 'STEP');
      
      let streamFound = false;
      
      // Основной паттерн
      if (site.videoPattern) {
        const match = videoHtml.match(site.videoPattern);
        if (match) {
          const url = match[1] || match[0];
          log(`✓ ОСНОВНОЙ паттерн: <span class="video-url">${url.substring(0, 120)}...</span>`, 'success', 'PASS');
          detail.stream = url.substring(0, 200);
          streamFound = true;
          
          // Тест доступности URL
          await testVideoUrl(url, site.name);
        } else {
          log(`✗ Основной паттерн НЕ найден: <code>${site.videoPattern.source.substring(0, 80)}</code>`, 'error');
        }
      }
      
      // Тест nodeFile (Xhamster и др.)
      if (site.videoNodeFile && !streamFound) {
        try {
          const doc = new DOMParser().parseFromString(videoHtml, 'text/html');
          const node = doc.evaluate(site.videoNodeFile, doc, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
          if (node) {
            const href = node.getAttribute('href') || node.getAttribute('content') || node.getAttribute('src');
            if (href) {
              log(`✓ nodeFile найден: <span class="video-url">${href.substring(0, 120)}</span>`, 'success', 'PASS');
              detail.stream = href.substring(0, 200);
              streamFound = true;
            }
          }
        } catch(e) {}
      }
      
      // [DEV#1] Альтернативные паттерны для TrahKino и др.
      if (site.altVideoPatterns) {
        log(`  🔍 Проверка альтернативных паттернов (${site.altVideoPatterns.length}):`, 'warn');
        for (const alt of site.altVideoPatterns) {
          const match = videoHtml.match(alt.regex);
          if (match) {
            const found = Array.isArray(match) && match.length > 1 ? match.slice(0, 3) : [match[0]?.substring(0, 150)];
            log(`  ✓ <b>${alt.name}</b>: ${found.map(f => `<span class="video-url">${f?.substring(0, 100)}</span>`).join(' | ')}`, 'success');
            if (!streamFound) {
              detail.stream = (match[1] || match[0])?.substring(0, 200);
              streamFound = true;
            }
          } else {
            log(`  ✗ ${alt.name}: не найден`, 'dim');
          }
        }
      }
      
      // Общий поиск MP4/M3U8 URL если ничего не нашли
      if (!streamFound) {
        log(`  🔍 Поиск любых медиа-URL в HTML...`, 'warn');
        
        const mp4s = videoHtml.match(/https?:\/\/[^\s'"<>]+\.mp4[^\s'"<>]*/g);
        const m3u8s = videoHtml.match(/https?:\/\/[^\s'"<>]+\.m3u8[^\s'"<>]*/g);
        
        if (mp4s && mp4s.length) {
          // Фильтруем preview
          const real = mp4s.filter(u => !u.includes('preview') && !u.includes('screenshot'));
          log(`  MP4 URLs найдено: ${mp4s.length} (реальных: ${real.length})`, real.length ? 'success' : 'warn');
          real.slice(0, 5).forEach(u => log(`    → <span class="video-url">${u.substring(0, 120)}</span>`, 'dim'));
          if (real.length) { detail.stream = real[0].substring(0, 200); streamFound = true; }
        }
        
        if (m3u8s && m3u8s.length) {
          log(`  M3U8 URLs найдено: ${m3u8s.length}`, 'success');
          m3u8s.slice(0, 3).forEach(u => log(`    → <span class="video-url">${u.substring(0, 120)}</span>`, 'dim'));
          if (!streamFound && m3u8s.length) { detail.stream = m3u8s[0].substring(0, 200); streamFound = true; }
        }
        
        if (!mp4s && !m3u8s) {
          log(`  ✗ Медиа-URL не найдены в HTML!`, 'error');
          
          // Дамп JS-переменных плеера
          log(`  📋 Поиск конфигурации плеера:`, 'warn');
          const playerConfigs = [
            /flashvars\s*=\s*\{([^}]{100,500})\}/,
            /video_url[:\s]*['"]([^'"]+)/,
            /var\s+player\s*=\s*\{([^}]{50,500})\}/,
            /sources:\s*\[([^\]]{50,500})\]/,
            /file:\s*['"]([^'"]+)/
          ];
          playerConfigs.forEach(rx => {
            const m = videoHtml.match(rx);
            if (m) log(`    Найдено: <code>${m[0].substring(0, 200).replace(/</g, '&lt;')}</code>`, 'warn');
          });
        }
      }
      
      if (!streamFound) {
        detail.stream = 'NOT FOUND';
      }
    }
  } else {
    log(`⚠ Шаг 3-4 пропущен: нет ссылки на видео`, 'warn', 'SKIP');
  }

  // ─── Итог ───
  const cardOk = cards.length > 0 || (detail.cards && !detail.cards.startsWith('FAIL'));
  const streamOk = detail.stream && detail.stream !== 'NOT FOUND' && !detail.stream.startsWith('FAIL');
  
  if (cardOk && streamOk) {
    detail.status = 'PASS';
    testResults.pass++;
    log(`✅ ${site.name}: ВСЕ ТЕСТЫ ПРОЙДЕНЫ`, 'success', 'PASS');
  } else if (cardOk || streamOk) {
    detail.status = 'WARN';
    testResults.warn++;
    log(`⚠️ ${site.name}: ЧАСТИЧНО (карточки: ${cardOk ? '✓' : '✗'}, видео: ${streamOk ? '✓' : '✗'})`, 'warn', 'FAIL');
  } else {
    detail.status = 'FAIL';
    testResults.fail++;
    log(`❌ ${site.name}: НЕ РАБОТАЕТ`, 'error', 'FAIL');
  }
  
  testResults.total++;
  testResults.details.push(detail);
  updateSummary();
  
  log('', 'dim'); // пустая строка-разделитель
  return detail;
}

// ======================================================================
// [CORE] Тест доступности видео-URL
// ======================================================================

async function testVideoUrl(url, siteName) {
  log(`  Шаг 5: Проверка доступности видео-URL...`, 'info', 'STEP');
  
  try {
    const proxy = document.getElementById('proxySelect').value;
    const fullUrl = proxy ? proxy + encodeURIComponent(url) : url;
    
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 10000);
    
    const resp = await fetch(fullUrl, { 
      method: 'HEAD', 
      signal: controller.signal 
    });
    clearTimeout(timer);
    
    const contentType = resp.headers.get('content-type') || 'unknown';
    const contentLength = resp.headers.get('content-length');
    const sizeMb = contentLength ? (parseInt(contentLength) / 1048576).toFixed(1) + ' MB' : 'unknown size';
    
    if (resp.ok) {
      log(`  ✓ Видео доступно: HTTP ${resp.status} | ${contentType} | ${sizeMb}`, 'success', 'PASS');
      
      // Пробуем добавить видео в тестовую область
      if (contentType.includes('video') || url.endsWith('.mp4')) {
        const videoEl = document.createElement('div');
        videoEl.innerHTML = `
          <p style="color:#ccc;margin:5px 0;font-size:12px;">${siteName}: ${url.substring(0, 80)}...</p>
          <video controls preload="metadata" style="max-width:400px;max-height:225px;border-radius:6px;">
            <source src="${proxy ? proxy + encodeURIComponent(url) : url}" type="video/mp4">
          </video>`;
        VIDEO_AREA.appendChild(videoEl);
      }
    } else {
      log(`  ✗ Видео недоступно: HTTP ${resp.status} ${resp.statusText}`, 'error', 'FAIL');
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      log(`  ⚠ Таймаут проверки видео-URL`, 'warn');
    } else {
      log(`  ⚠ Не удалось проверить (CORS/сеть): ${e.message}`, 'warn');
    }
  }
}

// ======================================================================
// [UI] Запуск тестов
// ======================================================================

async function runAllTests() {
  clearLog();
  const btn = document.getElementById('btnRunAll');
  btn.disabled = true;
  
  const sites = getSiteDefinitions();
  log(`🚀 Запуск тестирования ${sites.length} источников`, 'header');
  log(`CORS Proxy: ${document.getElementById('proxySelect').value || 'отключён'}`, 'dim');
  log(`Таймаут: ${document.getElementById('timeout').value} сек`, 'dim');
  log('', 'dim');
  
  for (let i = 0; i < sites.length; i++) {
    updateProgress(i + 1, sites.length);
    await testSite(sites[i]);
    // Пауза между сайтами чтобы не забанили
    await new Promise(r => setTimeout(r, 500));
  }
  
  generateReport();
  btn.disabled = false;
  log(`\n🏁 ТЕСТИРОВАНИЕ ЗАВЕРШЕНО`, 'header');
}

async function runFilteredTests() {
  const filter = document.getElementById('siteFilter').value.toLowerCase().trim();
  if (!filter) { alert('Введите имена сайтов через запятую'); return; }
  
  clearLog();
  const btn = document.getElementById('btnRunFiltered');
  btn.disabled = true;
  
  const filters = filter.split(',').map(s => s.trim());
  const allSites = getSiteDefinitions();
  const sites = allSites.filter(s => 
    filters.some(f => s.name.toLowerCase().includes(f))
  );
  
  if (!sites.length) {
    log(`❌ Сайты не найдены по фильтру: "${filter}"`, 'error');
    log(`Доступные: ${allSites.map(s => s.name).join(', ')}`, 'dim');
    btn.disabled = false;
    return;
  }
  
  log(`🚀 Тестирование ${sites.length} выбранных: ${sites.map(s => s.name).join(', ')}`, 'header');
  log('', 'dim');
  
  for (let i = 0; i < sites.length; i++) {
    updateProgress(i + 1, sites.length);
    await testSite(sites[i]);
    await new Promise(r => setTimeout(r, 500));
  }
  
  generateReport();
  btn.disabled = false;
}

// ======================================================================
// [UI] Генерация отчёта
// ======================================================================

function generateReport() {
  let html = '<div style="font-size:13px;">';
  html += `<h3 style="color:#00d4ff;margin-bottom:10px;">📊 Сводный отчёт</h3>`;
  html += `<table style="width:100%;border-collapse:collapse;">`;
  html += `<tr style="background:#21262d;"><th style="padding:6px;text-align:left;">Сайт</th><th>Листинг</th><th>Карточки</th><th>Видео URL</th><th>Поток</th><th>Статус</th></tr>`;
  
  testResults.details.forEach(d => {
    const color = d.status === 'PASS' ? '#3fb950' : d.status === 'WARN' ? '#d29922' : '#f85149';
    const icon = d.status === 'PASS' ? '✅' : d.status === 'WARN' ? '⚠️' : '❌';
    html += `<tr style="border-bottom:1px solid #21262d;">
      <td style="padding:4px 6px;font-weight:bold;">${d.site}</td>
      <td style="padding:4px;font-size:11px;color:${d.listing?.startsWith('FAIL') ? '#f85149' : '#aaa'}">${d.listing || '—'}</td>
      <td style="padding:4px;font-size:11px;color:${d.cards?.startsWith('FAIL') ? '#f85149' : '#aaa'}">${d.cards || '—'}</td>
      <td style="padding:4px;font-size:11px;max-width:150px;overflow:hidden;text-overflow:ellipsis;">${d.videoUrl?.substring(0, 40) || '—'}</td>
      <td style="padding:4px;font-size:11px;max-width:150px;overflow:hidden;text-overflow:ellipsis;color:${d.stream === 'NOT FOUND' ? '#f85149' : '#aaa'}">${d.stream?.substring(0, 40) || '—'}</td>
      <td style="padding:4px;color:${color};font-weight:bold;">${icon} ${d.status}</td>
    </tr>`;
  });
  
  html += `</table></div>`;
  REPORT.innerHTML = html;
}
